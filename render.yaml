services:
  - type: web
    name: review-rail-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: Dockerfile.render
    dockerContext: .
    dockerCommand: pnpm render:start:web
    preDeployCommand: pnpm render:migrate
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: review-rail-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: review-rail-cache
          property: connectionString
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ENABLE_LLM_REVIEW
        value: "false"
      - key: LLM_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: ollama
      - key: DEBUG_LLM_UI
        value: "false"

  - type: worker
    name: review-rail-worker
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: Dockerfile.render
    dockerContext: .
    dockerCommand: pnpm render:start:worker
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: review-rail-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: review-rail-cache
          property: connectionString
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ENABLE_LLM_REVIEW
        value: "false"
      - key: LLM_ENABLED
        value: "false"
      - key: LLM_PROVIDER
        value: ollama
      - key: DEBUG_LLM_UI
        value: "false"

  - type: keyvalue
    name: review-rail-cache
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: review-rail-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"
    databaseName: ai_reviewer
    ipAllowList: []
